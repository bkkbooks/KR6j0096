body:
  text: 若欲入向道場者先澡浴清淨以真言手印灑淨所換之衣次以真言加持其衣而著真言曰唵微莾羅莎縛賀次即衣著真言曰唵鉢哩嚩羅多嚩曰里尼吽次飲水灑淨真言曰唵摩訶入嚩羅吽次入向道場時不起貪欲瞋恚等專念本尊而住住自他本清淨步步想踐連華往次至道場門外灑淨云云次香水灑身以後稱吽字三聲然後道場并觀想聖衆遍滿道場如影重之不相妨礙次入道場已面向於本尊合掌作禮禮三部尊及本尊已舉頭諦觀佛菩薩金剛像也向佛陳説三世宿愆惡障重懺本尊所亦如是懺禮偈曰我從過去世流轉於生死今對大聖尊盡心而懺悔如先佛所懺我今亦如是願承加持力衆生悉清淨以此大願故自他獲無垢次香水淨三業真言曰唵薩嚩二合婆嚩輸馱薩嚩達麼薩嚩二合婆嚩輸度啥次定心已作三部三昧耶真言曰唵怛他引蘖覩納婆二合縛引也娑嚩二合引訶佛唵跛娜謨二合納婆二合縛引也娑嚩二合引賀蓮唵嚩曰盧二合納婆二合縛也婆嚩二合引賀引已上三部三昧耶次遣除身中毗那夜迦真言曰唵闍波沒㗚帝賀囊迦囊吽泮吒次辟除諸障真言曰曩謨嚩日羅也吽賀囊莾他尾特夢婆輸𬧹羅也泮吒七遍次辟除諸物所有諸難在多意云云真言曰唵枳哩枳哩羅嚩嗟捺羅𤙖泮吒三遍次去垢真言曰唵枳哩枳哩嚩日羅𤙖泮吒七遍次清淨真言曰唵爾囊爾迦次光澤真言曰唵帝誓帝惹徒尾寧徒提沙馱吽泮吒三遍次神分次唱禮一切恭敬次供文次四方四佛四菩薩次本尊稱名三遍次三部界會一切佛菩薩等次驚覺真言曰唵嚩曰魯二合用底瑟吒二合吽印者二手各金剛拳舒頭指各頭側相柱二小指相交每誦一遍作印拳動次九方便至心歸命歸命十方正等覺三世一切具三身歸命一切大乘法歸命不退菩提衆歸命諸明真實言歸命一切諸密印以身口意清淨業殷勤無量恭敬禮歸命頂禮藥師琉璃光佛次禮方便真言曰印者以金剛部印當額誦呪禮拜唵引一曩莫薩縛怛他引蘗多二迦引野弭縛引吃質二合多三縛日羅二合滿娜南迦嚕弭次至心歸依次真言印者金剛合掌次施身方便了歸命頂禮施身方便真言如例印者金剛合掌投身舒耳若莊校投者運心耳次至心發願了歸命頂禮發菩提心方便真言次至心懺悔了歸命頂禮次真言印者先金剛合掌大指頭指舒著次至心隨喜了次歸命頂禮次真言印者金剛合掌次至心勸請了次歸命頂禮次真言印者金剛合掌次至心奉請誦了次歸命頂禮次真言先作向清印入內大指更出舌頭指鉤召次至心回向誦了次歸命頂禮次真言如例印金剛合掌云云次護身真言曰唵嚩日羅二合引嚚儞二合嚩羅捻跛跢二合引也娑縛二合賀次大護身真言曰唵入嚩羅囊也𤙖泮吒次被甲真言曰唵度比度比迦也度比鉢羅入嚩里寧娑婆賀次結髮真言曰唵蘇悉地羯哩莎嚩賀次結地界真言曰唵枳里枳里嚩日羅二合縛曰里二合部律二合半音滿馱滿馱吽發吒半音次結方隅金剛幡真言曰唵薩羅薩羅縛日羅二合伽羅吽泮吒半音次置寶座等真言曰唵毗莾嚕挪地𤙖三遍次阿者羅吽三遍唵阿者羅微𭋸娑婆賀三遍唵迦莾羅娑婆賀三遍唵囊莾薩嚩怛他蘖哆南薩羅嚩他欠烏跢蘖帝娑破羅呬莾闍伽伽囊釰娑嚩賀三遍次以我功德力如來加持力及以法界力普供養而住次大虛空藏普通供養真言并印唵誐誐曩三去婆嚩嚩日羅二合斛引次遏伽以辨事真言持誦後以部母呪呪之置於左邊次部母真言曰娜牟婆伽婆都烏瑟尼沙耶唵盧盧娑普嚧若嚩羅帝瑟他悉陀嚕者儞薩嚩羅他娑但儞莎訶次於寶座上觀本尊種子字并結根本印云云次轉字成本尊真言曰曩莫三滿多沒馱引南次欲請本尊先執香爐誦真言淨治空中道路真言曰唵蘇悉地迦里入嚩二合里多南多暮羅二合曳入嚩二合羅滿馱滿馱賀囊賀囊𤙖泮吒次發願啓白衆次奉請本尊更先想座已也成就車輅送本尊所云云寶車輅真言曰唵都嚕都嚕吽次請車輅真言曰娜麼悉底哩野二合地尾二合迦引南怛他引𮓌多引南引一唵嚩曰郎二合銀儞野三合引羯唎沙也二合莎訶次召請奉本尊真真言曰唵枳里枳里嚩日羅吽泮吒七遍次視三昧耶真言曰唵升羯三莾煙莎訶七遍次奉閼伽真言曰唵藥乞私囊那也見捺羅達弩鉢捨莎訶三遍次奉蓮華座誦三部真言獻成用道用唵味羅味羅也莎訶唵鉢那莾味羅也莎訶唵縛日羅味羅也莎訶次陳善來世尊真言持誦奉獻次結上方金剛網真言曰唵尾娑普二合羅捺落二合乞刃二合縛日羅二合半惹羅吽泮吒次上下方次火院真言曰唵阿三莾擬儞吽泮吒次重結大界真言曰唵升羯莾訶三摩焰莎訶七遍次奉塗香真言曰伊𠰢言馱輸婆儞微夜二合輸者也輸者輸者輸者也莾夜儞吠儞始薄訖底也二合鉢羅二合底仡㗚呬也鉢羅二合四椰𠰢唵阿賀羅阿賀羅薩羅縛尾儞夜達羅布爾帝莎訶七遍奉華真言伊𠰢蘇莾囊素儞尾夜輪者輸輸者輸囊也莽夜寧唵伏儞多薄訖底二合夜鉢羅底仡㗚呬也鉢羅四挪𠰢唵阿賀羅阿賀羅薩羅縛尾儞夜達羅布爾帝莎訶奉燒香真言曰阿閻縛囊沙鉢底羅素賀㗚儞也健陀值也蘇羅部若曩莽夜寧吠儞始薄訖底夜度報閻鉢羅底仡㗚呬也難唵阿去賀羅阿賀羅薩羅縛尾儞夜達羅布爾莎訶奉食真言曰奧灑涕難羅素賀㗚二合他也二合𪾼灑涌多羅二合設怒麼里莽也寧唵吠儞始薄訖底夜二合鉢羅底仡呬也二合鉢羅四椰吽唵阿去羅賀阿羅賀薩羅縛尾儞夜二合達羅布爾帝莎訶奉燈真言曰羅訖芻二合近曩二合灑者二合跛尾怛羅二合室者二合瞻謨尾曇莽曩短名輸婆莽夜寧吠儞始薄訖底夜二合儞報閻鉢羅底訖㗚二合呬也難唵阿路迦也薩羅尾儞夜二合達羅布爾帝莎婆賀次運心供養以心運想水陸諸華無曰主所遍滿虛空盡十方界及以人天妙塗香雲燒香燈明幢幡寶蓋種種鼓樂歌舞妓唱真珠羅網懸諸寶領髣白拂微妙聲鋒矜羯尼網如意寶樹衣服之雲天諸廚膳上妙香美味宮殿樓閣寶柱莊嚴身頭冠瓔珞如是等雲行者運心遍滿虛空以至誠心如是供養最為勝上是故行者以決定心而行此法運心供養誦持真言及作手印如上所想皆悉成就真言曰唵薩羅嚩他龕搵娜𮓌帝娑頗羅呬門伽伽曩釰莎訶七遍次讚歎佛曰摩賀引迦引抳嚕引建曩引貪一捨娑跢二合引藍薩嚩吠得微閉反引儞泥以反南二合奔浦閟反去女鼻音娜地蠅二合𩄽拏引馱藍三鉢羅二合拏上摩引弭怛他引誐耽四佛唵羅擬野二合惹引曩南引秫詩佛反淡一戍婆引訥𮓌底丁以反謨引左釰二本播引羅沫體他以反迦謎引建耽三曩謎引達𤚥舍麼嚩憾四法穆訖耽二合穆訖底二合播引他引鉢羅二合跛耽二合引誐乞灑二合野索引弭野二嚩引沙體二合耽乞灑二合怛覽二合尾始瑟鵂𩄽上拏刎無本反一曩謎引僧去健左婆引嚩上跢都各反四僧薩嚩母馱婆羅二合捨跢二合引野三勃哩二合跢引野𩄽𩄽覽二阿嚩路引枳多僧去枳娘二合野三曩謨引𩕳髻摩賀答摩二合儞四菩薩摩賀引摩攞勤可反野贊拏野上尾儞野二合羅惹日羅反野娑引馱吠引準反二訥難上多娜摩迦夜引三曩謨引悉帝嚩日羅二合播引拏上曳引去四金剛衆阿引演引覩泥嚩左誐素羅一緊那上羅那囉鑠迦羅二合那野二鉢羅二合嚩羅二合達麼蘖里二合多地伽羅三尾達麼左鉢羅二合捨麼操爾也二合四儞銘二合多部多銘多鉢羅二合迦捨夜五怛儞賀室羅二合摩拏也馱引𤚥引六二合諸天次發願次散念誦先禮三寶次禮本尊然後普禮諸佛次持誦人先麻座捺婆等座謂跏趺半跏賢麻座令身端直次把數珠右三回轉次安珠二掌中頂戴云云次結根本印誦根本真言七遍次念誦了即頂戴珠發願安置本處次結根本印誦根本真言七遍次更奉塗香華燒香飯燈次運心供養次讚次奉閼伽次發願次解界次示三昧及禮拜諸尊次誦現在諸如來之偈次奉送真言次回九方便次回向次三部三昧耶次護身次護本尊等次遍禮諸尊然後去當堂道場任意經行小指檀慧上左下右無名指戒方上左下右中指忍願上右下左頭指進力上左下右大指禪智上左下右善來尊者善來尊者由本願力而來降赴顧乘加持授此請并受我所辦諸供養起大慈悲唯垂納受現在諸如來救世諸菩薩不斷大乘教到殊勝位者唯願聖天衆決定證知我各當隨處安後時垂哀赴終頌我今念誦祕密呪普通三界得清淨願我生中除業障福德圓滿利有情生生世世恆受持四恩衆生共成佛
